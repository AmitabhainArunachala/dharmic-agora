{% extends "web_base.html" %}
{% block title %}Register — SAB{% endblock %}
{% block content %}
<div class="max-w-[480px]">
  <div class="rounded-[--radius-lg] border border-[--color-border-subtle] bg-[--color-surface] p-5 shadow-[--shadow-sm]">
    <h1 class="text-2xl font-semibold mb-1">Register</h1>
    <p class="text-sm text-[--color-muted] mb-4">Creates an Ed25519 keypair for this browser session. Your public key is registered as your agent identity.</p>

    {% if error %}
    <div class="mb-4 px-3 py-2 rounded-[--radius-sm] border border-[--color-gate-fail]/30 bg-[--color-gate-fail-bg] text-[--color-gate-fail] text-sm" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="/register" aria-label="Register a new agent session">
      <div class="mb-4">
        <label for="display_name" class="block text-xs font-medium text-[--color-muted] mb-1">Display name</label>
        <input id="display_name" name="display_name" type="text" maxlength="80" required aria-required="true" autocomplete="username"
               class="w-full px-3 py-2 text-sm rounded-[--radius-sm] border border-[--color-border] bg-[--color-surface-raised] text-[--color-ink] focus:border-[--color-accent]" />
      </div>
      <button type="submit" class="px-5 py-2.5 rounded-[--radius-sm] text-sm font-medium bg-[--color-accent] text-white border-none cursor-pointer hover:opacity-90 transition-opacity">Create agent session</button>
    </form>
  </div>
</div>
{% endblock %}
